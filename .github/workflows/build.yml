name: Build APK Artifact

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Grant execute permission for Gradle wrapper
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      # 4. Build APK (Release)
      - name: Build APK (Release)
        run: ./gradlew clean :app:assembleRelease

      # 5. Find APK automatically
      - name: Prepare APK artifact
        id: prepare_apk
        run: |
          mkdir -p release
          APK_PATH=$(find . -type f -path "*/build/outputs/apk/release/*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK tidak ditemukan!"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" release/app-release.apk
          echo "apk_path=release/app-release.apk" >> $GITHUB_OUTPUT

      # 6. Upload APK as artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: ${{ steps.prepare_apk.outputs.apk_path }}
