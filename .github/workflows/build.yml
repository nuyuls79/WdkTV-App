name: Build and Release CloudStream Extension Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build APK (Release)
        run: ./gradlew clean :app:assembleRelease

      - name: Get version for release
        id: get_version
        run: |
          VERSION=$(date +'%Y%m%d.%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/extension.apk
        # Jika gradle meng-outputkan APK dengan nama lain, ubah path di atas sesuai nama APK

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: release/extension.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
